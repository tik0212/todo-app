<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="style/reset.css" />
    <link rel="stylesheet" href="style/style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="main">
      <h1 class="h1">To-Do App</h1>

      <div class="wrapper">
        <input type="text" id="taskInput" class="task-input" placeholder="Enter a task" />
        <button type="button" id="addBtn" class="add-btn">Add</button>
      </div>

      <div class="filter-buttons">
        <button class="all-btn" id="allBtn">All</button>
        <button class="active-btn" id="activeBtn">Active</button>
        <button class="completed-btn" id="completedBtn">Completed</button>
      </div>

      <ul id="tasklist"></ul>
    </div>
  </body>
</html>
